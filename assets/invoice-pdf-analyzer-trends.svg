<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 768" role="img" aria-labelledby="title desc">
  <title id="title">Invoice PDF Analyzer sandwich cost trend</title>
  <desc id="desc">Dark chart showing estimated sandwich cost over time compared with a fixed sale price line.</desc>
  <rect width="2048" height="768" fill="#101217"/>
  <g font-family="Arial, sans-serif">
    <text x="14" y="50" fill="#f6f7fb" font-size="50" font-weight="800">Trends</text>
    <text x="14" y="125" fill="#aeb0b7" font-size="25" font-weight="700">Tracks estimated sandwich cost over time and compares it against the fixed sandwich sale price.</text>
    <g stroke="#30333c" stroke-width="2">
      <line x1="144" y1="248" x2="2002" y2="248"/>
      <line x1="144" y1="317" x2="2002" y2="317"/>
      <line x1="144" y1="387" x2="2002" y2="387"/>
      <line x1="144" y1="457" x2="2002" y2="457"/>
      <line x1="144" y1="527" x2="2002" y2="527"/>
    </g>
    <g fill="#d9dbe2" font-size="22" font-weight="700">
      <text x="103" y="256">16</text><text x="103" y="326">15</text><text x="103" y="396">14</text>
      <text x="103" y="466">13</text><text x="103" y="536">12</text>
      <text x="156" y="675">Dec 28</text><text x="167" y="705">2025</text>
      <text x="353" y="675">Jan 11</text><text x="742" y="675">Feb 8</text><text x="931" y="675">Feb 22</text>
      <text x="1131" y="675">Mar 8</text><text x="1321" y="675">Mar 22</text><text x="1520" y="675">Apr 5</text>
      <text x="1706" y="675">Apr 19</text><text x="1905" y="675">May 3</text>
    </g>
    <text x="62" y="515" transform="rotate(-90 62 515)" fill="#d9dbe2" font-size="27" font-weight="800">Estimated Sandwich Cost</text>
    <text x="1035" y="755" fill="#d9dbe2" font-size="28" font-weight="800">Period</text>
    <line x1="144" y1="248" x2="2002" y2="248" stroke="#ff8217" stroke-width="4" stroke-dasharray="18 18"/>
    <text x="1900" y="236" fill="#d9dbe2" font-size="22" font-weight="800">Sale Price</text>
    <path d="M244 605 L673 604 L1060 508 L1512 603 L1902 602" fill="none" stroke="#1f77b4" stroke-width="6"/>
    <g fill="#1f77b4">
      <circle cx="244" cy="605" r="6"/><circle cx="673" cy="604" r="6"/><circle cx="1060" cy="508" r="6"/>
      <circle cx="1512" cy="603" r="6"/><circle cx="1902" cy="602" r="6"/>
    </g>
    <line x1="1060" y1="208" x2="1060" y2="635" stroke="#50525a" stroke-width="4" stroke-dasharray="6 8"/>
