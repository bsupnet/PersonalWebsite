    <text x="1078" y="418" fill="#d9dbe2" font-size="23" font-weight="800">Mar 1, 2026</text>
    <text x="1150" y="456" fill="#f6f7fb" font-size="23" font-weight="800">Date: Mar 1, 2026</text>
    <text x="1150" y="486" fill="#f6f7fb" font-size="23" font-weight="800">Estimated sandwich cost: $12.26</text>
    <text x="1150" y="516" fill="#f6f7fb" font-size="23" font-weight="800">Sale price: $16.00</text>
    <text x="1150" y="546" fill="#f6f7fb" font-size="23" font-weight="800">Gross profit: $3.74</text>
    <text x="1150" y="576" fill="#f6f7fb" font-size="23" font-weight="800">Gross margin: 23.4%</text>
    <text x="1150" y="606" fill="#f6f7fb" font-size="23" font-weight="800">Coverage: Partial</text>
