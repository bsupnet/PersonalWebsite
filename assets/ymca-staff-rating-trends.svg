<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1365 768" role="img" aria-labelledby="title desc">
  <title id="title">Average rating by Month and staff name</title>
  <desc id="desc">Power BI style line chart showing average YMCA evaluation ratings rising from January through March for six staff members.</desc>
  <rect width="1365" height="768" fill="#fff"/>
  <text x="30" y="20" fill="#3f3f3f" font-family="Arial, sans-serif" font-size="18" font-weight="700">Average of rating by Month and staff_name</text>
  <text x="30" y="44" fill="#565656" font-family="Arial, sans-serif" font-size="14" font-weight="700">staff_name</text>
  <g font-family="Arial, sans-serif" font-size="14" fill="#6d6d6d">
    <circle cx="118" cy="40" r="5" fill="#1e90ff"/><text x="128" y="44">Aarya Odedra</text>
    <circle cx="223" cy="40" r="5" fill="#1639b5"/><text x="233" y="44">Anab Mohamed</text>
    <circle cx="339" cy="40" r="5" fill="#ec6a2c"/><text x="349" y="44">Ella Hughes</text>
    <circle cx="433" cy="40" r="5" fill="#760084"/><text x="443" y="44">Melissa Sananes</text>
    <circle cx="544" cy="40" r="5" fill="#e640a7"/><text x="554" y="44">Mojtaba Yousefi</text>
    <circle cx="671" cy="40" r="5" fill="#7860c9"/><text x="681" y="44">Owen Simmons</text>
  </g>
  <g stroke="#e5e5e5" stroke-dasharray="2 5">
    <line x1="80" y1="65" x2="1355" y2="65"/>
    <line x1="80" y1="173" x2="1355" y2="173"/>
    <line x1="80" y1="281" x2="1355" y2="281"/>
    <line x1="80" y1="389" x2="1355" y2="389"/>
    <line x1="80" y1="497" x2="1355" y2="497"/>
    <line x1="80" y1="605" x2="1355" y2="605"/>
    <line x1="80" y1="713" x2="1355" y2="713"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="13" fill="#777">
    <text x="54" y="69">5.0</text><text x="54" y="177">4.5</text><text x="54" y="285">4.0</text>
    <text x="54" y="393">3.5</text><text x="54" y="501">3.0</text><text x="54" y="609">2.5</text><text x="54" y="717">2.0</text>
    <text x="243" y="729">January</text><text x="694" y="729">February</text><text x="1157" y="729">March</text>
  </g>
  <text x="44" y="396" transform="rotate(-90 44 396)" fill="#444" font-family="Arial, sans-serif" font-size="14" font-weight="700">Average of rating</text>
  <text x="697" y="751" fill="#444" font-family="Arial, sans-serif" font-size="14" font-weight="700">Month</text>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="3">
    <path d="M263 570 L720 269 L1175 86" stroke="#1e90ff" opacity=".45"/>
    <path d="M263 604 L720 326 L1175 64" stroke="#1639b5" opacity=".45"/>
    <path d="M263 551 L720 306 L1175 137" stroke="#ec6a2c" opacity=".45"/>
    <path d="M263 522 L720 292 L1175 172" stroke="#760084" opacity=".65"/>
    <path d="M263 520 L720 319 L1175 151" stroke="#e640a7" opacity=".85"/>
    <path d="M263 577 L720 328 L1175 119" stroke="#7860c9" opacity=".45"/>
  </g>
  <g>
    <line x1="719" y1="63" x2="719" y2="713" stroke="#a5a5a5" stroke-width="2"/>
    <circle cx="720" cy="269" r="5" fill="#1e90ff"/><circle cx="720" cy="326" r="5" fill="#1639b5"/>
    <circle cx="720" cy="306" r="5" fill="#ec6a2c"/><circle cx="720" cy="292" r="5" fill="#760084"/>
    <circle cx="720" cy="319" r="5" fill="#e640a7"/><circle cx="720" cy="328" r="5" fill="#7860c9"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="513" y="294" width="172" height="202" fill="#fff" stroke="#d8d8d8"/>
    <text x="528" y="323" fill="#303030" font-family="Arial, sans-serif" font-size="14" font-weight="700">February</text>
    <g font-family="Arial, sans-serif" font-size="12" fill="#555">
      <circle cx="533" cy="338" r="5" fill="#1e90ff"/><text x="558" y="343">Aarya Odedra</text><text x="647" y="343">4.05</text>
      <circle cx="533" cy="357" r="5" fill="#1639b5"/><text x="558" y="362">Anab Mohamed</text><text x="647" y="362">3.82</text>
      <circle cx="533" cy="376" r="5" fill="#ec6a2c"/><text x="558" y="381">Ella Hughes</text><text x="647" y="381">3.89</text>
      <circle cx="533" cy="395" r="5" fill="#760084"/><text x="558" y="400">Melissa Sananes</text><text x="647" y="400">3.94</text>
      <circle cx="533" cy="414" r="5" fill="#e640a7"/><text x="558" y="419">Mojtaba Yousefi</text><text x="647" y="419">3.88</text>
      <circle cx="533" cy="433" r="5" fill="#7860c9"/><text x="558" y="438">Owen Simmons</text><text x="647" y="438">3.78</text>
    </g>
    <line x1="513" y1="457" x2="685" y2="457" stroke="#dedede"/>
    <text x="543" y="483" fill="#666" font-family="Arial, sans-serif" font-size="13">Drill down</text>
  </g>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity=".16"/>
    </filter>
  </defs>
</svg>
