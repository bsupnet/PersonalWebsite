<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1365 768" role="img" aria-labelledby="title desc">
  <title id="title">Count of category id by Month and moment tag</title>
  <desc id="desc">Layered area chart showing YMCA moment counts by month for First, Invitation, Milestone, and Surprise and Delight categories.</desc>
  <rect width="1365" height="768" fill="#fff"/>
  <text x="30" y="18" fill="#3f3f3f" font-family="Arial, sans-serif" font-size="18" font-weight="700">Count of category_id by Month and moment_tag</text>
  <text x="30" y="44" fill="#565656" font-family="Arial, sans-serif" font-size="14" font-weight="700">moment_tag</text>
  <g font-family="Arial, sans-serif" font-size="14" fill="#6d6d6d">
    <circle cx="125" cy="40" r="5" fill="#1e90ff"/><circle cx="144" cy="40" r="5" fill="#153bb6"/><text x="154" y="44">First</text>
    <circle cx="185" cy="40" r="5" fill="#ef6b2c"/><text x="195" y="44">Invitation</text>
    <circle cx="261" cy="40" r="5" fill="#760084"/><text x="271" y="44">Milestone</text>
    <circle cx="340" cy="40" r="5" fill="#e64aa8"/><text x="350" y="44">Surprise &amp; Delight</text>
  </g>
  <g stroke="#e5e5e5" stroke-dasharray="2 5">
    <line x1="90" y1="63" x2="1292" y2="63"/>
    <line x1="90" y1="220" x2="1292" y2="220"/>
    <line x1="90" y1="377" x2="1292" y2="377"/>
    <line x1="90" y1="534" x2="1292" y2="534"/>
    <line x1="90" y1="691" x2="1292" y2="691"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="13" fill="#777">
    <text x="52" y="67">2,000</text><text x="52" y="224">1,500</text><text x="52" y="381">1,000</text>
    <text x="63" y="538">500</text><text x="75" y="695">0</text>
    <text x="248" y="708">January</text><text x="680" y="708">February</text><text x="1117" y="708">March</text>
  </g>
  <text x="42" y="390" transform="rotate(-90 42 390)" fill="#444" font-family="Arial, sans-serif" font-size="14" font-weight="700">Count of category_id</text>
  <text x="696" y="750" fill="#444" font-family="Arial, sans-serif" font-size="14" font-weight="700">Month</text>
  <g>
    <polygon points="265,437 700,95 1137,596 1137,691 265,691" fill="#e64aa8" fill-opacity=".38" stroke="#e64aa8" stroke-width="3"/>
    <polygon points="265,511 700,248 1137,617 1137,691 265,691" fill="#760084" fill-opacity=".31" stroke="#760084" stroke-width="3"/>
    <polygon points="265,571 700,402 1137,638 1137,691 265,691" fill="#ef6b2c" fill-opacity=".35" stroke="#ef6b2c" stroke-width="3"/>
    <polygon points="265,639 700,538 1137,659 1137,691 265,691" fill="#153bb6" fill-opacity=".35" stroke="#153bb6" stroke-width="3"/>
  </g>
  <line x1="700" y1="63" x2="700" y2="691" stroke="#a5a5a5" stroke-width="2"/>
  <circle cx="700" cy="95" r="5" fill="#e64aa8"/><circle cx="700" cy="248" r="5" fill="#760084"/>
  <circle cx="700" cy="402" r="5" fill="#ef6b2c"/><circle cx="700" cy="538" r="5" fill="#153bb6"/>
  <circle cx="1137" cy="686" r="5" fill="#1e90ff"/>
  <g filter="url(#shadow)">
    <rect x="518" y="239" width="174" height="121" fill="#fff" stroke="#d8d8d8"/>
    <text x="532" y="267" fill="#303030" font-family="Arial, sans-serif" font-size="14" font-weight="700">February</text>
    <g font-family="Arial, sans-serif" font-size="12" fill="#555">
      <circle cx="537" cy="280" r="5" fill="#153bb6"/><text x="625" y="285">First</text><text x="661" y="285">482</text>
      <circle cx="537" cy="299" r="5" fill="#ef6b2c"/><text x="596" y="304">Invitation</text><text x="661" y="304">439</text>
      <circle cx="537" cy="318" r="5" fill="#760084"/><text x="596" y="323">Milestone</text><text x="661" y="323">487</text>
      <circle cx="537" cy="337" r="5" fill="#e64aa8"/><text x="575" y="342">Surprise &amp; Delight</text><text x="661" y="342">490</text>
    </g>
  </g>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity=".16"/>
    </filter>
  </defs>
</svg>
