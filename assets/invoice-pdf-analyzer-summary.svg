<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 1300" role="img" aria-labelledby="title desc">
  <title id="title">Invoice PDF Analyzer upload and KPI summary</title>
  <desc id="desc">Dark dashboard interface for uploading invoice PDFs and reviewing sandwich cost, gross profit, gross margin, cost change, and margin change.</desc>
  <rect width="2048" height="1300" fill="#101217"/>
  <g font-family="Arial, sans-serif">
    <text x="36" y="85" fill="#f6f7fb" font-size="72" font-weight="800">Invoice PDF Analyzer</text>
    <text x="36" y="165" fill="#f6f7fb" font-size="29" font-weight="600">Upload supplier invoice PDFs to extract ingredient pricing, map invoice items to sandwich components, and track cost and margin changes over time.</text>
    <text x="36" y="275" fill="#f6f7fb" font-size="48" font-weight="800">Upload Invoice PDFs or Images</text>
    <text x="36" y="345" fill="#d5d6dc" font-size="28" font-weight="600">Add one or more supplier invoice PDFs or images. PDFs use text extraction; JPG, JPEG, and PNG files use local OCR before the normal parser runs.</text>
    <text x="36" y="410" fill="#f6f7fb" font-size="25" font-weight="700">Upload Invoice PDFs or Images</text>
    <rect x="34" y="430" width="1880" height="202" rx="14" fill="#292a33"/>
    <g fill="#11131a">
      <rect x="58" y="454" width="270" height="70" rx="12"/>
      <rect x="340" y="454" width="354" height="70" rx="12"/>
      <rect x="706" y="454" width="342" height="70" rx="12"/>
      <rect x="1060" y="454" width="335" height="70" rx="12"/>
      <rect x="1408" y="454" width="325" height="70" rx="12"/>
      <rect x="58" y="540" width="331" height="70" rx="12"/>
      <rect x="402" y="540" width="341" height="70" rx="12"/>
      <rect x="755" y="540" width="335" height="70" rx="12"/>
      <rect x="1102" y="540" width="327" height="70" rx="12"/>
    </g>
    <g fill="#f9fafb" font-size="25" font-weight="700">
      <text x="136" y="490">Bondi.pdf</text>
      <text x="417" y="490">Chefs' Warehouse.pdf</text>
      <text x="782" y="490">mr_dair...reated.pdf</text>
      <text x="1138" y="490">Orderin...ervice.pdf</text>
      <text x="1486" y="490">invoice...isions.pdf</text>
      <text x="136" y="576">invoice..._foods.pdf</text>
      <text x="481" y="576">invoice...uce_co.pdf</text>
      <text x="834" y="576">invoice...supply.pdf</text>
      <text x="1181" y="576">invoice...ervice.pdf</text>
    </g>
    <g fill="#a7a9b2" font-size="20" font-weight="700">
      <text x="136" y="518">84.9KB</text><text x="417" y="518">40.2KB</text><text x="782" y="518">3.4KB</text>
      <text x="1138" y="518">51.8KB</text><text x="1486" y="518">3.7KB</text><text x="136" y="604">3.9KB</text>
      <text x="481" y="604">3.7KB</text><text x="834" y="604">3.8KB</text><text x="1181" y="604">4.5KB</text>
    </g>
    <g fill="#f9fafb">
      <rect x="64" y="458" width="56" height="56" rx="10"/><rect x="346" y="458" width="56" height="56" rx="10"/>
      <rect x="712" y="458" width="56" height="56" rx="10"/><rect x="1066" y="458" width="56" height="56" rx="10"/>
      <rect x="1414" y="458" width="56" height="56" rx="10"/><rect x="64" y="544" width="56" height="56" rx="10"/>
      <rect x="408" y="544" width="56" height="56" rx="10"/><rect x="761" y="544" width="56" height="56" rx="10"/>
      <rect x="1108" y="544" width="56" height="56" rx="10"/>
    </g>
    <text x="36" y="730" fill="#f6f7fb" font-size="48" font-weight="800">Analysis Controls</text>
    <text x="36" y="802" fill="#f6f7fb" font-size="25" font-weight="700">Sandwich</text>
    <text x="766" y="802" fill="#f6f7fb" font-size="25" font-weight="700">Time Frame</text>
    <text x="1260" y="802" fill="#8f9199" font-size="25" font-weight="700">Invoice Coverage</text>
    <rect x="34" y="824" width="704" height="72" rx="13" fill="#292a33"/>
    <rect x="766" y="824" width="464" height="72" rx="13" fill="#292a33"/>
    <rect x="1260" y="824" width="655" height="72" rx="13" fill="#292a33"/>
    <text x="60" y="870" fill="#f6f7fb" font-size="30">Chicken</text>
    <text x="793" y="870" fill="#f6f7fb" font-size="30">Monthly</text>
    <text x="1286" y="870" fill="#8f9199" font-size="30">2026-01-08 to 2026-05-29</text>
    <text x="36" y="995" fill="#f6f7fb" font-size="48" font-weight="800">KPI Summary</text>
    <g fill="#101217" stroke="#30333c" stroke-width="2">
      <rect x="34" y="1038" width="287" height="188" rx="16"/><rect x="354" y="1038" width="287" height="188" rx="16"/>
      <rect x="672" y="1038" width="287" height="188" rx="16"/><rect x="990" y="1038" width="287" height="188" rx="16"/>
      <rect x="1310" y="1038" width="287" height="238" rx="16"/><rect x="1628" y="1038" width="287" height="188" rx="16"/>
    </g>
    <g fill="#f6f7fb">
      <text x="65" y="1095" font-size="25" font-weight="700">Current Ingredient ...</text><text x="65" y="1170" font-size="60">$10.93</text>
      <text x="383" y="1095" font-size="25" font-weight="700">Selling Price</text><text x="383" y="1170" font-size="60">$16.00</text>
      <text x="702" y="1095" font-size="25" font-weight="700">Gross Profit</text><text x="702" y="1170" font-size="60">$5.07</text>
      <text x="1020" y="1095" font-size="25" font-weight="700">Gross Margin</text><text x="1020" y="1170" font-size="60">31.7%</text>
      <text x="1340" y="1095" font-size="25" font-weight="700">Cost Change</text><text x="1340" y="1170" font-size="60">+$0.05</text>
      <text x="1658" y="1095" font-size="25" font-weight="700">Margin Change</text><text x="1658" y="1170" font-size="60">-0.3%</text>
    </g>
    <rect x="1340" y="1202" width="112" height="42" rx="21" fill="#135c35"/>
    <text x="1353" y="1232" fill="#59e58d" font-size="24" font-weight="800">+0.5%</text>
  </g>
</svg>
